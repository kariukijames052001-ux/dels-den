<!DOCTYPE html>
<html>
<head>
    <title>DEL'S DEN</title>
    <meta charset="UTF-8">
</head>

<body>

<h1>DEL'S DEN - Ride The Dream</h1>

<button onclick="buy()">Buy Bike</button>

<script>
async function buy(){
    try {
        const res = await fetch('https://dels-den.onrender.com');
        const text = await res.text();
        alert(text);
    } catch (error) {
        alert("Error connecting to server ❌");
    }
}
</script>
