<!DOCTYPE html>
<html>
<head>
    <title>DEL'S DEN</title>
    <meta charset="UTF-8">
</head>

<body>

<h1>DEL'S DEN - Ride The Dream</h1>

<button onclick="buy()">Buy Bike</button>

<script>
async function buy(){
  const phone = prompt("Enter your M-Pesa number:");

  try {
    const res = await fetch("https://dels-den.onrender.com/order", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ phone })
    });

    const data = await res.json();
    alert(data.message);

  } catch (error) {
    alert("Error connecting to server ❌");
  }
}
</script>

</body>
</html>
