<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEL'S DEN | Ride The Dream</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#0d0d0d;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
background:#111;
border-bottom:1px solid #222;
}

.logo{
font-size:32px;
font-weight:bold;
color:#f7c948;
}

nav a{
color:white;
text-decoration:none;
margin-left:25px;
font-size:18px;
}

nav a:hover{
color:#f7c948;
}

.hero{
height:90vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
background:linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.7)),
url('https://images.unsplash.com/photo-1511994298241-608e28f14fde?auto=format&fit=crop&w=1400&q=80');
background-size:cover;
background-position:center;
}

.hero-content h1{
font-size:64px;
margin-bottom:20px;
}

.hero-content p{
font-size:22px;
color:#ddd;
margin-bottom:30px;
}

.btn{
padding:15px 35px;
background:#f7c948;
color:black;
font-size:20px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

.btn:hover{
transform:scale(1.05);
}

.products{
padding:70px 8%;
}

.products h2{
text-align:center;
font-size:42px;
margin-bottom:40px;
color:#f7c948;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
}

.card{
background:#151515;
padding:20px;
border-radius:14px;
text-align:center;
box-shadow:0 0 15px rgba(0,0,0,.4);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
border-radius:12px;
margin-bottom:15px;
}

.card h3{
margin-bottom:10px;
font-size:24px;
}

.price{
color:#f7c948;
font-size:24px;
margin-bottom:15px;
}

footer{
text-align:center;
padding:30px;
background:#111;
margin-top:50px;
color:#888;
}
</style>
</head>

<body>

<header>
<div class="logo">DEL'S DEN</div>

<nav>
<a href="#">Home</a>
<a href="#">Bikes</a>
<a href="#">Contact</a>
</nav>
</header>

<section class="hero">
<div class="hero-content">
<h1>Ride The Dream</h1>
<p>Premium Bikes For Champions</p>
<button class="btn" onclick="buy()">Buy Now</button>
</div>
</section>

<section class="products">
<h2>Featured Bikes</h2>

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1507035895480-2b3156c31fc8?auto=format&fit=crop&w=800&q=80">
<h3>Mountain Bike</h3>
<div class="price">KSh 35,000</div>
<button class="btn" onclick="buy()">Order</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1541625602330-2277a4c46182?auto=format&fit=crop&w=800&q=80">
<h3>Road Bike</h3>
<div class="price">KSh 48,000</div>
<button class="btn" onclick="buy()">Order</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1571068316344-75bc76f77890?auto=format&fit=crop&w=800&q=80">
<h3>Electric Bike</h3>
<div class="price">KSh 72,000</div>
<button class="btn" onclick="buy()">Order</button>
</div>

</div>
</section>

<footer>
© 2026 DEL'S DEN. All Rights Reserved.
</footer>

<script>
async function buy(){

const phone = prompt("Enter your M-Pesa Number:");

try{

const res = await fetch("https://dels-den.onrender.com/order",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({phone})
});

const data = await res.json();

alert(data.message);

}catch(error){

alert("Server error ❌");

}

}
</script>

</body>
</html>
